name: Deploy production Pages

on:
  push:
    branches: [production]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        id: pages
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          VITE_APP_MODE: ${{ vars.VITE_APP_MODE || 'demo' }}
          VITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}
      - run: npm run audit:privacy
        env:
          PRIVACY_FORBIDDEN_STRINGS: ${{ secrets.PRIVACY_FORBIDDEN_STRINGS }}
      - uses: actions/upload-pages-artifact@v4
        with: { path: dist }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
