name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run audit:privacy
        env:
          PRIVACY_FORBIDDEN_STRINGS: ${{ secrets.PRIVACY_FORBIDDEN_STRINGS }}
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -- --project=desktop-1440 --project=mobile-390
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: visual-validation, path: artifacts/screenshots, if-no-files-found: ignore }

  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with: { version: latest }
      - run: supabase db start
      - run: supabase test db

  edge-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }
      - run: deno test --config supabase/functions/deno.json supabase/functions/_shared/schemas_test.ts
      - name: Type-check Edge Functions
        run: |
          deno check --config supabase/functions/deno.json supabase/functions/submit-review/index.ts
          deno check --config supabase/functions/deno.json supabase/functions/submit-report/index.ts
          deno check --config supabase/functions/deno.json supabase/functions/request-faculty/index.ts
          deno check --config supabase/functions/deno.json supabase/functions/moderate-content/index.ts
