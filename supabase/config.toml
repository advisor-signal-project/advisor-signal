project_id = "advisor-signal-local"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://127.0.0.1:5173/admin"]
enable_signup = true
enable_anonymous_sign_ins = true

[functions.submit-review]
verify_jwt = true
[functions.submit-report]
verify_jwt = true
[functions.request-faculty]
verify_jwt = true
[functions.moderate-content]
verify_jwt = true
